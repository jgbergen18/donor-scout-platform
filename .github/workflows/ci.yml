name: CI

# Run on every push and PR. Tests are fully offline (the test harness strips all
# provider keys), so no secrets are required for CI to pass.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test + build (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      # Compiles the native better-sqlite3 addon (ubuntu runners ship gcc/make/python3).
      - name: Install server dependencies
        run: npm ci

      - name: Syntax check
        run: node --check server.js

      # node:test across all suites; offline (helpers.js deletes ANTHROPIC/GitHub/
      # LinkedIn keys and points DATA_DIR at a throwaway temp DB).
      - name: Run tests
        run: npm test

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build client (Vite)
        run: npm --prefix client run build

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Builds the multi-stage image (incl. the native better-sqlite3 compile and the
      # client build) to validate the Dockerfile. No push — this is a build check.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: donor-scout:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
